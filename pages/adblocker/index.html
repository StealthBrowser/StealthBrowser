<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Blocker - Stealth Browser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="adblock-page">
    <h1>Ad Blocker</h1>
    <div class="stats">
      <div class="stat"><span class="num" id="blocked">0</span><span class="label">Requests Blocked</span></div>
      <div class="stat"><span class="num" id="domains">0</span><span class="label">Tracker Domains</span></div>
    </div>
    <section>
      <h2>Blocked Domains</h2>
      <div id="domain-list"></div>
      <div class="add-rule">
        <input type="text" id="new-domain" placeholder="example-tracker.com">
        <button id="add-btn">Block</button>
      </div>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
