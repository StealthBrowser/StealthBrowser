<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Stealth Browser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="settings-page">
    <h1>Settings</h1>
    <section>
      <h2>Ad Blocker</h2>
      <label class="toggle"><input type="checkbox" checked id="adblock"> Enable Ad Blocker</label>
      <label class="toggle"><input type="checkbox" checked id="trackers"> Block Trackers</label>
    </section>
    <section>
      <h2>Privacy</h2>
      <label class="toggle"><input type="checkbox" checked id="clear-close"> Clear data on close</label>
      <label class="toggle"><input type="checkbox" checked id="cookies"> Block cookies</label>
      <label class="toggle"><input type="checkbox" checked id="dnt"> Do Not Track</label>
    </section>
    <section>
      <h2>Fingerprint Protection</h2>
      <label class="toggle"><input type="checkbox" checked id="canvas"> Spoof Canvas</label>
      <label class="toggle"><input type="checkbox" checked id="webgl"> Spoof WebGL</label>
      <label class="toggle"><input type="checkbox" checked id="screen"> Spoof Screen</label>
      <label class="toggle"><input type="checkbox" checked id="audio"> Spoof Audio</label>
      <label class="toggle"><input type="checkbox" checked id="navigator"> Spoof Navigator</label>
    </section>
    <section>
      <h2>Security</h2>
      <label class="toggle"><input type="checkbox" checked id="https-only"> HTTPS Only Mode</label>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
