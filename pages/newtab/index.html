<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab - Stealth Browser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ntp-page">
    <div class="ntp-content">
      <img src="/assets/logo.svg" alt="Stealth Browser" class="logo">
      <h1>Stealth Browser</h1>
      <p class="tagline">Private. Secure. Zero tracking.</p>
      <div class="search-box">
        <input type="text" id="search" placeholder="Search the web..." autofocus>
      </div>
      <div class="features">
        <div class="feature">
          <span class="feature-icon">&#128737;</span>
          <span class="feature-text">Ad Blocker Active</span>
        </div>
        <div class="feature">
          <span class="feature-icon">&#128274;</span>
          <span class="feature-text">Zero Data Stored</span>
        </div>
        <div class="feature">
          <span class="feature-icon">&#128737;</span>
          <span class="feature-text">Fingerprint Protected</span>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
