name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-security:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: StealthBrowser
      - uses: actions/checkout@v4
        with:
          repository: StealthBrowser/stealth-adblocker
          path: stealth-adblocker
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build security module
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: stealth-adblocker
      - name: Run tests
        run: cargo test --target ${{ matrix.target }}
        working-directory: stealth-adblocker
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd stealth-adblocker/target/${{ matrix.target }}/release
          tar czf ../../../stealth-adblocker-${{ matrix.artifact }}.tar.gz libstealth_adblocker.*
          cd ../../..
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd stealth-adblocker/target/${{ matrix.target }}/release
          Compress-Archive -Path stealth_adblocker.dll, stealth_adblocker.lib -DestinationPath ../../stealth-adblocker-${{ matrix.artifact }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: security-${{ matrix.artifact }}
          path: stealth-adblocker/stealth-adblocker-*
          retention-days: 30

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build UI
        run: |
          cd src/ui
          npm ci
          npm run build
      - name: Package UI
        run: |
          cd src/ui/dist
          tar czf ../../stealth-ui-web.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: ui-build
          path: stealth-ui-web.tar.gz
          retention-days: 30

  release:
    needs: [build-security, build-ui]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create source archive
        run: |
          git archive --format=tar.gz --prefix=StealthBrowser-${{ github.ref_name }}/ HEAD -o StealthBrowser-source.tar.gz
      - name: List artifacts
        run: find artifacts -type f | head -20
      - name: Generate checksums
        run: |
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > SHA256SUMS
          sha256sum StealthBrowser-source.tar.gz >> SHA256SUMS
          cat SHA256SUMS
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Stealth Browser ${{ github.ref_name }}
          body: |
            ## Stealth Browser ${{ github.ref_name }}

            A privacy-focused browser with **C++ engine**, **Rust security**, and **TypeScript UI**.

            ### What's Included

            | Asset | Description |
            |-------|-------------|
            | `stealth-adblocker-linux-amd64.tar.gz` | Ad blocker engine for Linux (x64) |
            | `stealth-adblocker-macos-arm64.tar.gz` | Ad blocker engine for macOS (Apple Silicon) |
            | `stealth-adblocker-macos-x64.tar.gz` | Ad blocker engine for macOS (Intel) |
            | `stealth-adblocker-windows-amd64.zip` | Ad blocker engine for Windows (x64) |
            | `stealth-ui-web.tar.gz` | TypeScript UI (React + Vite) |
            | `StealthBrowser-source.tar.gz` | Full source code |

            ### Quick Start

            **Install Rust** (https://rustup.rs):
            ```bash
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh
            ```

            **Build from source:**
            ```bash
            git clone --recurse-submodules https://github.com/StealthBrowser/StealthBrowser.git
            cd StealthBrowser

            # Setup dev environment
            python3 scripts/setup.py

            # Build everything
            python3 scripts/build.py --target release

            # Run
            ./out/release/stealth-browser
            ```

            **Pre-built modules:**
            ```bash
            # Extract the ad blocker for your platform
            tar xzf stealth-adblocker-linux-amd64.tar.gz  # Linux
            # or
            unzip stealth-adblocker-windows-amd64.zip      # Windows

            # Extract the UI
            tar xzf stealth-ui-web.tar.gz -C src/ui/dist/
            ```

            ### Architecture

            | Component | Language | Purpose |
            |-----------|----------|---------|
            | Browser Engine | C++ | Chromium-based core, process isolation |
            | Security Module | Rust | AES-256-GCM crypto, URL filtering, privacy |
            | UI Framework | TypeScript | React-based tabs, settings, navigation |
            | Internal Pages | HTML/CSS/JS | New tab, settings, ad blocker dashboard |
            | Build System | GN + Ninja | Chromium-compatible build pipeline |
            | Automation | Python | Build, lint, test, setup scripts |

            ### Verify
            ```bash
            sha256sum -c SHA256SUMS
            ```
          files: |
            artifacts/**/*
            StealthBrowser-source.tar.gz
            SHA256SUMS
          draft: false
          prerelease: false
