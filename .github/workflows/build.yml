name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: release

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang lld \
            libgtk-3-dev libglib2.0-dev libnss3-dev libxss-dev \
            libasound2-dev libpulse-dev libssl-dev libffi-dev \
            libatk-bridge2.0-dev gperf bison flex \
            libx11-xcb-dev libdrm-dev libgbm-dev
      - name: Build Rust security module
        run: cargo build --release --manifest-path src/security/Cargo.toml
      - name: Test Rust module
        run: cargo test --manifest-path src/security/Cargo.toml
      - name: Build UI
        run: |
          cd src/ui
          npm ci
          npm run build
      - name: Build browser (Ninja)
        run: python3 scripts/build.py --target $BUILD_TYPE --skip-rust --skip-ui
      - name: Package
        run: python3 scripts/build.py --package --skip-rust --skip-ui
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            out/release/stealth-browser
            dist/*
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: brew install ninja gn
      - name: Build Rust
        run: cargo build --release --manifest-path src/security/Cargo.toml
      - name: Test Rust
        run: cargo test --manifest-path src/security/Cargo.toml
      - name: Build UI
        run: cd src/ui && npm ci && npm run build
      - name: Build browser
        run: python3 scripts/build.py --target $BUILD_TYPE --skip-rust --skip-ui
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            out/release/stealth-browser
            dist/*
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          choco install ninja -y
          choco install llvm -y
      - name: Build Rust
        run: cargo build --release --manifest-path src/security/Cargo.toml
      - name: Test Rust
        run: cargo test --manifest-path src/security/Cargo.toml
      - name: Build UI
        run: cd src/ui; npm ci; npm run build
      - name: Build browser
        run: python scripts/build.py --target $env:BUILD_TYPE --skip-rust --skip-ui
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            out/release/stealth-browser*
            dist/*
          retention-days: 30

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test Rust module
        run: cargo test --manifest-path src/security/Cargo.toml
      - name: Lint
        run: python3 scripts/lint.py || true

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f ! -name '*.zip' ! -name '*.txt' -exec sha256sum {} \; > ../SHA256SUMS
          cd ..
          cat SHA256SUMS
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Stealth Browser ${{ github.ref_name }}
          body: |
            ## Stealth Browser ${{ github.ref_name }}

            ### Installation

            **Windows:**
            1. Download `StealthBrowser-{version}-Setup.exe`
            2. Run installer and follow prompts
            3. Launch from Start Menu or Desktop shortcut

            **macOS:**
            1. Download `StealthBrowser-{version}.dmg`
            2. Open DMG and drag to Applications
            3. Launch from Applications

            **Linux (AppImage):**
            ```bash
            chmod +x StealthBrowser-*.AppImage
            ./StealthBrowser-*.AppImage
            ```

            **Linux (DEB):**
            ```bash
            sudo dpkg -i StealthBrowser-{version}.deb
            stealth-browser
            ```

            **Linux (RPM):**
            ```bash
            sudo rpm -i StealthBrowser-{version}.rpm
            stealth-browser
            ```

            ### Build From Source
            ```bash
            git clone https://github.com/itriedcoding/StealthBrowser.git
            cd StealthBrowser
            python3 scripts/setup.py
            python3 scripts/build.py --target release
            ```

            ### Verify
            ```bash
            sha256sum -c SHA256SUMS
            ```
          files: |
            artifacts/**/*
            SHA256SUMS
          draft: false
          prerelease: false
